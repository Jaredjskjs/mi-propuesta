<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dijo que sí 💍</title>

<style>
body{
margin:0;
min-height:100vh;
padding:60px 20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
background:linear-gradient(135deg,#fff0f5,#ffd6e7);
overflow-y:auto;
overflow-x:hidden;
font-family:Georgia, serif;
text-align:center;
}

h1{
font-size:clamp(2.4rem,8vw,5rem);
color:#d63384;
animation:latido 1.2s infinite alternate;
margin-top:40px;
}

button{
margin-top:30px;
padding:18px 35px;
font-size:22px;
border:none;
border-radius:20px;
background:#ff4d88;
color:white;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,.15);
}

button:hover{
transform:scale(1.05);
}

#carta{
display:none;
max-width:900px;
width:90%;
background:white;
padding:35px;
margin-top:40px;
margin-bottom:80px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
font-size:23px;
line-height:1.8;
text-align:left;
white-space:pre-wrap;
}

.cursor{
display:inline-block;
animation:blink .8s infinite;
}

.corazon{
position:fixed;
font-size:30px;
animation:caer 7s linear infinite;
pointer-events:none;
}

@keyframes latido{
from{
transform:scale(1);
}
to{
transform:scale(1.08);
}
}

@keyframes blink{
50%{
opacity:0;
}
}

@keyframes caer{
from{
transform:translateY(-10vh);
}
to{
transform:translateY(110vh);
}
}
</style>
</head>
<body>



<!-- Música YouTube -->
<iframe
id="ytplayer"
width="0"
height="0"
src="https://www.youtube.com/embed/x-Y3fSURPms?enablejsapi=1"
frameborder="0"
allow="autoplay">
</iframe>



<h1 id="titulo">
¡DIJISTE QUE SÍ! 💍
</h1>



<button id="inicioBtn" onclick="abrirCarta()">
Ejecutar mi promesa ❤️
</button>



<div id="carta">
<span id="texto"></span>
<span class="cursor">|</span>
</div>



<script>

const mensaje=
`> Iniciando declaración...

Desde el día que te conocí,
has cambiado mi vida totalmente.

Tal vez esto aún no sea oficial,
pero es un adelanto
de lo que vendrá pronto.

Cuando te veo a los ojos
estoy totalmente seguro
de que quiero vivir a tu lado.

No buscaría a nadie más
que no seas tú
ni en un millón de vidas.

No soy bueno con las palabras...

así que lo hice
en el idioma que estás aprendiendo ahora:

los códigos.


if (mi_corazon == contigo){
   futuro = "para siempre";
}


while (vida){
   amar(te);
}


Con amor,

tu futuro prometido 💍`;



let i=0;
let iniciado=false;



function abrirCarta(){

if(iniciado) return;
iniciado=true;

document.getElementById("carta").style.display="block";

let player=document.getElementById("ytplayer");
player.src += "&autoplay=1";

escribir();

}



function escribir(){

if(i < mensaje.length){

document.getElementById(
"texto"
).innerHTML += mensaje.charAt(i);

i++;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

setTimeout(escribir,55);

}

else{
botonFinal();
}

}




function botonFinal(){

let boton=document.createElement("button");

boton.innerHTML=
"Aceptar mi destino 💍";


boton.onclick=function(){

document.getElementById(
"titulo"
).style.display="none";

document.getElementById(
"carta"
).style.display="none";

document.getElementById(
"inicioBtn"
).style.display="none";

boton.style.display="none";


let escena=document.createElement("div");

escena.innerHTML=`

<div style="
display:flex;
flex-direction:column;
align-items:center;
padding-top:70px;
text-align:center;
">

<h1>
Has desbloqueado el anillo...
</h1>


<div id="ring"
style="
font-size:130px;
margin-top:40px;
cursor:pointer;
animation:latido 1s infinite alternate;
">
💍
</div>


<p style="
font-size:28px;
max-width:800px;
margin-top:30px;">
Toca el anillo para sellar nuestro destino
</p>



<div id="finalMessage"
style="
display:none;
margin-top:40px;
max-width:900px;
font-size:30px;
line-height:1.7;
padding:30px;
background:white;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
">

🎉 LEGENDARIA DESBLOQUEADA 🎉

<br><br>

💍 Prometida

<br><br>

Rareza: Única ⭐

<br><br>

Main para toda la vida

<br><br>

Serías el brawler
que usaría como mi main,

te maxearía

y compraría todas tus skins

sin importar cuántas gemas cueste.

<br><br>

⭐ Tú serías mi legendaria favorita.

<br><br>

Eres mi personaje favorito,
y contigo sí gasto todas las gemas.

<br><br>

❤️ Compromiso aceptado ❤️

<br><br>

Ahora comienza nuestra historia...

</div>

</div>
`;

document.body.appendChild(escena);



document.getElementById(
"ring"
).onclick=function(){

this.innerHTML="✨💍✨";

document.getElementById(
"finalMessage"
).style.display="block";


for(let i=0;i<180;i++){
setTimeout(
crearCorazon,
i*70
);
}

};

};


document.body.appendChild(
boton
);

}




function crearCorazon(){

let c=document.createElement("div");

c.className="corazon";

c.innerHTML="💖";

c.style.left=
Math.random()*100+"vw";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},7000);

}



setInterval(
crearCorazon,
350
);

</script>

</body>
</html>
